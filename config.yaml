  - DOMAIN,alkalimakersuite-pa.googleapis.com,Gemini
  - DOMAIN,proactivebackend-pa.googleapis.com,Gemini
  - DOMAIN,gip-pa.googleapis.com,Gemini
  - DOMAIN,oyd-pa.googleapis.com,Gemini
  - DOMAIN,texttospeech.googleapis.com,Gemini

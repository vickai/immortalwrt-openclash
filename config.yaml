  - RULE-SET,OpenAI / Domain,OpenAI
  - RULE-SET,Anthropic / Domain,Anthropic
  - RULE-SET,Groq / Domain,Groq
  - RULE-SET,Perplexity / Domain,Perplexity

  - DOMAIN-SUFFIX,copilot.microsoft.com,Copilot
  - DOMAIN-SUFFIX,bing.com,Copilot
  - DOMAIN-SUFFIX,bingapis.com,Copilot
  - DOMAIN-SUFFIX,edgeservices.bing.com,Copilot
  - DOMAIN-SUFFIX,sydney.bing.com,Copilot

  # 3. 社交与流媒体

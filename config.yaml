  # 5. 开发与常用大厂
  - RULE-SET,Github / Domain,Github
  - RULE-SET,Docker / Domain,Docker
  - RULE-SET,Microsoft / Domain,Microsoft
  - RULE-SET,Google / Domain,Google

  # 6. 兜底逻辑
  # GFW 列表走国外
  - RULE-SET,GFW / Domain,国外站点
  # 非大陆 IP 归属域名的走国外 (防止 GFW 列表漏杀)
  - RULE-SET,geolocation-!cn / Domain,国外站点

  # 7. 国内直连兜底
  - RULE-SET,cn-domain / Domain,国内站点
  - RULE-SET,cn-ip / IP,国内站点,no-resolve

  # 8. 最终匹配
  - MATCH,漏网之鱼

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

rule-providers:
  # --- 自定义规则 ---
  Custom / Domain: {<<: *class, url: "https://gh-proxy.com/github.com/vickai/meta/raw/refs/heads/main/rules-dat/custom-rules.list"}

---
proxy-providers:
  狗狗机场:
    url: "<机场订阅地址>"
    type: http
    interval: 7200
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

  牛逼机场:
    url: "<机场订阅地址>"
    type: http
    interval: 7200
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: aAxCZs5P

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # 主 DNS（国内 DoH）
  nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query

  # fallback（海外 DoH + 国内兜底）
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - 114.114.114.114

  # fallback 过滤（防污染）
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

  # IoT / 局域网 / NTP 兼容增强
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
    - "*.local"
    - "*.router"
    - "*.localdomain"
    - "*.home.arpa"
    - "*.invalid"
    - "*.localhost"
    - "ntp.*"
    - "*.ntp.org"
    - "time.*"
    - "pool.ntp.org"
    - "*.synology.com"
    - "*.qnap.com"
    - "*.tplinkwifi.net"
    - "*.miwifi.com"
    - "*.huawei.com"
    - "*.haier.com"
    - "*.hisilicon.com"
    - "*.aqara.com"
    - "*.tuya.com"
    - "*.xiaomi.com"
    - "*.mi.com"
    - "*.home"

  respect-rules: true
  use-hosts: true
  use-system-hosts: true

# IoT / 局域网域名优先走本地 DNS
nameserver-policy:
  "geosite:cn": 114.114.114.114
  "geosite:private": 114.114.114.114
  "geosite:apple-cn": 114.114.114.114

# TCP/UDP 优化
tcp-concurrent: true
unified-delay: true
keep-alive-interval: 15

ipv6: false

profile:
  store-selected: true
  store-fake-ip: true


default: &default
  type: select
  proxies:
    - 直连
    - 所有-手动
    - 所有-自动
    - 其他-手动
    - 美国-故转
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 新加坡-故转
    - 韩国-故转
    - 英国-故转
    - 大流量线路
    - 拒绝


proxy-groups:
  - {name: 自选站点, <<: *default}
  - {name: 检测工具, <<: *default}
  # ----------------------------------------------------------------------------
  # --- AI 服务 ---
  - name: Gemini
    type: select
    proxies:
      - 美国-故转
      - 日本-故转
      - 台湾-故转
      - 新加坡-故转
      - 韩国-故转
      - 其他-手动
      - 所有-手动
      - 拒绝
  - name: OpenAI
    type: select
    proxies:
      - 美国-故转
      - 日本-故转
      - 台湾-故转
      - 新加坡-故转
      - 韩国-故转
      - 英国-故转
      - 其他-手动
      - 所有-手动
      - 拒绝
  # ----------------------------------------------------------------------------
  - name: Copilot
    type: select
    proxies:
      - 台湾-故转
      - 美国-故转
      - 英国-故转
      - 日本-故转
      - 新加坡-故转
      - 香港-故转
      - 所有-手动
      - 拒绝
  - name: Anthropic
    type: select
    proxies:
      - 美国-故转
      - 英国-故转
      - 日本-故转
      - 新加坡-故转
      - 其他-手动
      - 所有-手动
      - 拒绝
  # ----------------------------------------------------------------------------
  - name: Groq
    type: select
    proxies:
      - 美国-故转
      - 日本-故转
      - 台湾-故转
      - 新加坡-故转
      - 韩国-故转
      - 所有-手动
      - 拒绝
  - name: Perplexity
    type: select
    proxies:
      - 美国-故转
      - 日本-故转
      - 台湾-故转
      - 新加坡-故转
      - 韩国-故转
      - 所有-手动
      - 拒绝
  # ----------------------------------------------------------------------------
  # --- 社交与媒体 ---
  - name: Meta
    type: select
    proxies:
      - 香港-故转
      - 新加坡-故转
      - 日本-故转
      - 台湾-故转
      - 美国-故转
      - 韩国-故转
      - 所有-手动
      - 拒绝
  - name: X
    type: select
    proxies:
      - 新加坡-故转
      - 日本-故转
      - 美国-故转
      - 香港-故转
      - 台湾-故转
      - 英国-故转
      - 所有-手动
      - 拒绝
  # ----------------------------------------------------------------------------
  - name: Telegram
    type: select
    proxies:
      - 新加坡-故转
      - 香港-故转
      - 日本-故转
      - 台湾-故转
      - 韩国-故转
      - 美国-故转
      - 其他-手动
      - 所有-手动
      - 拒绝
  - name: TikTok
    type: select
    proxies:
      - 日本-故转
      - 美国-故转
      - 台湾-故转
      - 新加坡-故转
      - 韩国-故转
      - 其他-手动
      - 拒绝
  # ----------------------------------------------------------------------------
  - name: YouTube
    type: select
    proxies:
      - 香港-故转
      - 新加坡-故转
      - 日本-故转
      - 台湾-故转
      - 韩国-故转
      - 美国-故转
      - 所有-自动
      - 大流量线路
      - 拒绝
  - {name: Wikimedia, <<: *default}
  # ----------------------------------------------------------------------------
  # --- 开发与常用服务 ---
  - name: Google
    type: select
    proxies:
      - 香港-故转
      - 美国-故转
      - 日本-故转
      - 台湾-故转
      - 新加坡-故转
      - 韩国-故转
      - 其他-手动
      - 所有-手动
      - 拒绝
  - {name: Microsoft, <<: *default}
  # ----------------------------------------------------------------------------
  - {name: Github, <<: *default}
  - {name: Docker, <<: *default}
  # ----------------------------------------------------------------------------
  - {name: 苹果海外, <<: *default}
  - name: 广告过滤
    type: select
    proxies:
      - 拒绝
      - 直连
      - 所有-手动
  # ----------------------------------------------------------------------------
  # --- 区域与兜底 (对应 Rules 的指向) ---
  - name: 国外站点
    type: select
    proxies:
      - 自动-优选
      - 所有-自动
      - 所有-手动
      - 直连
      - 拒绝
  - name: 国内站点
    type: select
    proxies:
      - 直连
      - 所有-手动
      - 拒绝
  # ----------------------------------------------------------------------------
  - name: 漏网之鱼
    type: select
    proxies:
      - 自动-优选
      - 所有-自动
      - 所有-手动
      - 直连
      - 拒绝
  # 自动-优选高级组
  - name: 自动-优选
    type: fallback
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    proxies:
      - 香港-故转
      - 台湾-故转
      - 日本-故转
      - 新加坡-故转
      - 美国-故转
      - 所有-自动
  # ----------------------------------------------------------------------------
  # 故障转移组
  - name: 香港-故转
    type: fallback
    interval: 60
    lazy: false
    url: "http://www.gstatic.com/generate_204"
    proxies: [香港-手动, 香港-自动]
  - name: 台湾-故转
    type: fallback
    interval: 60
    lazy: false
    url: "http://www.gstatic.com/generate_204"
    proxies: [台湾-手动, 台湾-自动]

  - name: 日本-故转
    type: fallback
    interval: 60
    lazy: false
    url: "http://www.gstatic.com/generate_204"
    proxies: [日本-手动, 日本-自动]
  - name: 新加坡-故转
    type: fallback
    interval: 60
    lazy: false
    url: "http://www.gstatic.com/generate_204"
    proxies: [新加坡-手动, 新加坡-自动]

  - name: 韩国-故转
    type: fallback
    interval: 60
    lazy: false
    url: "http://www.gstatic.com/generate_204"
    proxies: [韩国-手动, 韩国-自动]
  - name: 美国-故转
    type: fallback
    interval: 60
    lazy: false
    url: "http://www.gstatic.com/generate_204"
    proxies: [美国-手动, 美国-自动]

  - name: 英国-故转
    type: fallback
    interval: 60
    lazy: false
    url: "http://www.gstatic.com/generate_204"
    proxies: [英国-手动, 英国-自动]
  - name: 其他-手动
    type: select
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?=.*(德国|DE|Germany|🇩🇪|加拿大|CA|Canada|🇨🇦|澳洲|澳大利亚|AU|Australia|🇦🇺)).*$"

  # 1. 香港 --------------------------------------------------------------------
  - name: 香港-手动
    type: select
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
  - name: 香港-自动
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  # 2. 台湾 --------------------------------------------------------------------
  - name: 台湾-手动
    type: select
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
  - name: 台湾-自动
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"

  # 3. 日本 --------------------------------------------------------------------
  - name: 日本-手动
    type: select
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
  - name: 日本-自动
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  # 4. 新加坡 ------------------------------------------------------------------
  - name: 新加坡-手动
    type: select
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
  - name: 新加坡-自动
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"

  # 5. 韩国 --------------------------------------------------------------------
  - name: 韩国-手动
    type: select
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"
  - name: 韩国-自动
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"

  # 6. 美国 --------------------------------------------------------------------
  - name: 美国-手动
    type: select
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|旧金山|华盛顿|拉斯维加斯|🇺🇸|United States)).*$"
  - name: 美国-自动
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|旧金山|华盛顿|拉斯维加斯|🇺🇸|United States)).*$"

  # 7. 英国 --------------------------------------------------------------------
  - name: 英国-手动
    type: select
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?=.*(英国|英|伦敦|UK|United Kingdom|🇬🇧|London)).*$"
  - name: 英国-自动
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(英国|英|伦敦|UK|United Kingdom|🇬🇧|London)).*$"

  # 8. 基础 --------------------------------------------------------------------
  - name: 所有-手动
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝|建议)).)*$"
  - name: 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(直连|拒绝|建议)).)*$"

  # 9. 大流量线路---------------------------------------------------------------
  - name: 大流量线路
    type: url-test
    use:
      - 牛逼机场
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    filter: "^((?!(直连|拒绝|到期|剩余|官网|客服|流量|Expire|Website|建议)).)*$"


rules:
  # 1. 最高优先级：自定义与检测
  - RULE-SET,Speedtest,直连

  # NTP服务
  - DST-PORT,123,直连

  # IoT / 局域网广播 / 组播 / 链路本地直连（极致兼容）
  - IP-CIDR,224.0.0.0/4,直连
  - IP-CIDR,239.0.0.0/8,直连
  - IP-CIDR,255.255.255.255/32,直连
  - IP-CIDR,169.254.0.0/16,直连
  - IP-CIDR,127.0.0.0/8,直连

  # IoT 常用端口直连
  # SSDP / UPnP
  - DST-PORT,1900,直连
  # mDNS
  - DST-PORT,5353,直连
  # ONVIF
  - DST-PORT,3702,直连
  # 海康威视
  - DST-PORT,8000,直连
  # RTSP
  - DST-PORT,554,直连
  # 小米 IoT
  - DST-PORT,7681,直连
  # CoAP
  - DST-PORT,5683,直连

  # IoT / 智能家居常见域名直连

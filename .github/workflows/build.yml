name: Build OpenClash Docker

on:
  workflow_dispatch:
    inputs:
      clash_core:
        description: "Clash Core Version"
        required: false
        default: "v1-smart"
        type: choice
        options:
          - v1
          - v2
          - v3
          - v1-smart
          - v2-smart
          - v3-smart

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 修复磁盘空间不足问题：OpenWrt 全源码编译需要大量空间
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # 修复 Ubuntu 24.04 依赖问题：移除已废弃的 python3-distutils
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          file wget python3-setuptools python3-pyelftools python3-dev \
          libtool-bin patch perl-modules subversion swig time

    - name: Generate version tag
      run: |
        export TZ='Asia/Shanghai'
        echo "VERSION=v24.10-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

    - name: Prepare rootfs
      run: |
        # 确保基础配置存在
        if [ -f ".config.base" ]; then
          cp .config.base .config
        fi

        # 执行构建脚本，增加 -x 以便在报错时查看详细执行过程
        bash -x build-rootfs.sh

        if [ ! -f "openwrt-rootfs.tar.gz" ]; then
          echo "❌ Rootfs build failed. Checking disk usage:"
          df -h
          exit 1
        fi

    - name: Download OpenClash core
      run: |
        chmod +x download-openclash-core.sh
        ./download-openclash-core.sh ${{ inputs.clash_core }}

    - name: Build Docker image
      run: |
        docker build \
          --build-arg VERSION=$VERSION \
          -t ghcr.io/${{ github.actor }}/immortalwrt-openclash:$VERSION \
          -t ghcr.io/${{ github.actor }}/immortalwrt-openclash:latest \
          .

    - name: Login to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push image
      run: |
        docker push ghcr.io/${{ github.actor }}/immortalwrt-openclash:$VERSION
        docker push ghcr.io/${{ github.actor }}/immortalwrt-openclash:latest
name: Build OpenClash Docker

on:
  workflow_dispatch:
    inputs:
      clash_core:
        description: "Clash Core Version"
        required: false
        default: "v1-smart"
        type: choice
        options:
          - v1
          - v2
          - v3
          - v1-smart
          - v2-smart
          - v3-smart

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gettext git libncurses5-dev libssl-dev \
          rsync unzip zlib1g-dev file wget

    - name: Generate version tag
      run: |
        export TZ='Asia/Shanghai'
        echo "VERSION=v24.10-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

    - name: Prepare rootfs
      run: |
        # 使用基础配置 (OpenClash 已在 .config.base 中启用)
        cp .config.base .config

        # 执行构建脚本
        bash build-rootfs.sh

        if [ ! -f "openwrt-rootfs.tar.gz" ]; then
          echo "❌ Rootfs build failed."
          exit 1
        fi

    - name: Download OpenClash core
      run: |
        chmod +x download-openclash-core.sh
        ./download-openclash-core.sh ${{ inputs.clash_core }}

    - name: Build Docker image
      run: |
        # 构建 OpenClash 专用镜像
        docker build \
          --build-arg VERSION=$VERSION \
          -t ghcr.io/${{ github.actor }}/immortalwrt-openclash:$VERSION \
          -t ghcr.io/${{ github.actor }}/immortalwrt-openclash:latest \
          .

    - name: Login to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push image
      run: |
        docker push ghcr.io/${{ github.actor }}/immortalwrt-openclash:$VERSION
        docker push ghcr.io/${{ github.actor }}/immortalwrt-openclash:latest